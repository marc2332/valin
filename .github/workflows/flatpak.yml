name: Flatpak

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  flatpak:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
          sudo flatpak install -y flathub org.freedesktop.Sdk.Extension.rust-stable//24.08

      - name: Build Flatpak and export to repo
        working-directory: flatpak
        run: |
          flatpak-builder --repo=repo --force-clean build-dir io.marc.valin.yml
          flatpak build-update-repo repo/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: flatpak/repo

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
